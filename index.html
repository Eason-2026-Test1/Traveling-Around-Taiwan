<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅遊景點收藏</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --surface2: #f3f0eb;
  --border: #e8e3da;
  --text: #1a1714;
  --text-muted: #6b6560;
  --accent: #3d6b4f;
  --accent-light: #e8f2ec;
  --accent2: #c4763a;
  --accent2-light: #fdf0e6;
  --danger: #c0392b;
  --tag-bg: #ede9e2;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* NAV */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.35rem;
  color: var(--accent);
  letter-spacing: 0.01em;
}
.logo span { color: var(--accent2); }
.nav-actions { display: flex; gap: 10px; align-items: center; }
.btn {
  padding: 7px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  color: var(--text);
  transition: all .15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn:hover { background: var(--surface2); border-color: #ccc; }
.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-primary:hover { background: #2e5238; border-color: #2e5238; }
.btn-sm { padding: 5px 12px; font-size: 12px; }

/* LAYOUT */
.layout { display: flex; height: calc(100vh - 60px); }
.sidebar {
  width: 240px;
  min-width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 1rem 0;
}
.main { flex: 1; overflow-y: auto; padding: 1.5rem 2rem; }

/* SIDEBAR */
.sidebar-section { margin-bottom: 0.5rem; }
.sidebar-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  text-transform: uppercase;
  padding: 0 1rem;
  margin-bottom: 4px;
}
.sidebar-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 1rem;
  cursor: pointer;
  border-radius: 0;
  font-size: 13.5px;
  color: var(--text);
  transition: background .12s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}
.sidebar-item:hover { background: var(--surface2); }
.sidebar-item.active {
  background: var(--accent-light);
  color: var(--accent);
  font-weight: 500;
}
.sidebar-item .count {
  font-size: 11px;
  background: var(--tag-bg);
  border-radius: 10px;
  padding: 1px 7px;
  color: var(--text-muted);
}
.sidebar-item.active .count { background: var(--accent); color: #fff; }
.sidebar-sep { height: 1px; background: var(--border); margin: 8px 1rem; }

/* MAIN HEADER */
.main-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.25rem;
}
.main-title { font-size: 1.3rem; font-weight: 700; }
.main-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

/* SEARCH BAR */
.search-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 1.25rem;
}
.search-input-wrap {
  flex: 1;
  position: relative;
}
.search-input-wrap svg {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
}
.search-input {
  width: 100%;
  padding: 9px 12px 9px 34px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: inherit;
  font-size: 13.5px;
  background: var(--surface);
  color: var(--text);
  outline: none;
  transition: border .15s;
}
.search-input:focus { border-color: var(--accent); }

/* ADD MODAL */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface);
  border-radius: 16px;
  padding: 2rem;
  width: 480px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(12px);
  transition: transform .2s;
}
.overlay.open .modal { transform: translateY(0); }
.modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.25rem; }
.form-group { margin-bottom: 1rem; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; display: block; letter-spacing: 0.04em; text-transform: uppercase; }
.form-input, .form-textarea, .form-select {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: inherit;
  font-size: 13.5px;
  background: var(--surface);
  color: var(--text);
  outline: none;
  transition: border .15s;
}
.form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent); }
.form-textarea { resize: vertical; min-height: 80px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
.ai-hint {
  font-size: 12px;
  color: var(--text-muted);
  background: var(--accent-light);
  border-radius: 6px;
  padding: 6px 10px;
  margin-top: 6px;
  display: none;
}
.ai-hint.visible { display: block; }
.ai-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--accent);
  padding: 4px 0;
}

/* SPOTS GRID */
.spots-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1rem;
}
.spot-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  transition: transform .15s, box-shadow .15s;
  cursor: pointer;
}
.spot-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}
.card-thumb {
  width: 100%;
  height: 130px;
  background: linear-gradient(135deg, var(--surface2) 0%, #e5e0d8 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  position: relative;
  overflow: hidden;
}
.card-thumb img { width: 100%; height: 100%; object-fit: cover; }
.card-thumb-emoji { font-size: 2.2rem; }
.card-body { padding: 12px 14px; }
.card-name { font-weight: 700; font-size: 14.5px; margin-bottom: 3px; }
.card-loc {
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 3px;
  margin-bottom: 8px;
}
.card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.tag {
  font-size: 11px;
  border-radius: 20px;
  padding: 2px 8px;
  background: var(--tag-bg);
  color: var(--text-muted);
}
.tag.region { background: var(--accent-light); color: var(--accent); }
.tag.type { background: var(--accent2-light); color: var(--accent2); }
.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-muted);
  padding-top: 8px;
  border-top: 1px solid var(--border);
}
.card-user {
  display: flex;
  align-items: center;
  gap: 5px;
}
.avatar {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card-del {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  padding: 3px 6px;
  border-radius: 5px;
  font-size: 12px;
  transition: all .12s;
}
.card-del:hover { background: #fdecea; color: var(--danger); }

/* EMPTY */
.empty {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--text-muted);
}
.empty-icon { font-size: 3rem; margin-bottom: 1rem; }
.empty h3 { font-size: 1rem; font-weight: 600; margin-bottom: 6px; color: var(--text); }

/* LOADING DOTS */
@keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
.dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--accent); animation:blink 1.2s infinite; }
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

/* TOAST */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--text);
  color: #fff;
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 13px;
  z-index: 999;
  transform: translateY(10px);
  opacity: 0;
  transition: all .2s;
  pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }

/* USER BADGE */
.user-label {
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

/* COUNTERS in sidebar region list */
.region-list { max-height: none; }

/* LINK PREVIEW */
.link-info {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* DETAIL MODAL */
.detail-modal {
  background: var(--surface);
  border-radius: 16px;
  width: 520px;
  max-width: 95vw;
  overflow: hidden;
  transform: translateY(12px);
  transition: transform .2s;
}
.overlay.open .detail-modal { transform: translateY(0); }
.detail-thumb {
  width: 100%;
  height: 180px;
  background: linear-gradient(135deg, var(--surface2) 0%, #ddd8cd 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 4rem;
  position: relative;
}
.detail-thumb img { width:100%; height:100%; object-fit:cover; }
.detail-body { padding: 1.5rem; }
.detail-name { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
.detail-loc { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; display:flex; align-items:center; gap:4px; }
.detail-note { font-size: 14px; color: var(--text); line-height: 1.6; margin-bottom: 12px; }
.detail-tags { display:flex; flex-wrap:wrap; gap:5px; margin-bottom: 12px; }
.detail-link a { color: var(--accent); font-size: 13px; word-break: break-all; }
.detail-footer {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d4cfc8; border-radius: 3px; }

/* COLLAPSIBLE COUNTY */
.county-children {
  overflow: hidden;
  max-height: 0;
  transition: max-height .25s ease;
}
.county-children.open { max-height: 600px; }
.sidebar-item .arrow {
  font-size: 10px;
  margin-left: auto;
  margin-right: 2px;
  color: var(--text-muted);
  transition: transform .2s;
  display: inline-block;
}
.sidebar-item.expanded .arrow { transform: rotate(90deg); }

@media (max-width: 680px) {
  .sidebar { display: none; }
  .main { padding: 1rem; }
  .spots-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <div class="logo">旅遊<span>清單</span></div>
  <div class="nav-actions">
    <div class="user-label">
      <div class="avatar" id="userAvatar">我</div>
      <input id="usernameInput" value="旅人" style="border:none;background:none;font-family:inherit;font-size:13px;color:var(--text);width:60px;outline:none;cursor:pointer;" title="點擊修改名稱" />
    </div>
    <button class="btn btn-primary" onclick="openAdd()">＋ 新增景點</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">篩選</div>
      <button class="sidebar-item active" onclick="filterRegion('all',this)">
        全部景點
        <span class="count" id="count-all">0</span>
      </button>
      <button class="sidebar-item" onclick="filterRegion('未分類',this)">
        📍 待分類
        <span class="count" id="count-未分類">0</span>
      </button>
    </div>
    <div class="sidebar-sep"></div>
    <div class="sidebar-section">
      <div class="sidebar-title">台灣地區</div>
      <div id="regionList"></div>
    </div>
    <div class="sidebar-sep"></div>
    <div class="sidebar-section">
      <div class="sidebar-title">工具</div>
      <button class="sidebar-item" onclick="exportData()">📤 匯出資料</button>
      <button class="sidebar-item" onclick="importData()">📥 匯入資料</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">
      <button class="sidebar-item" onclick="clearAll()" style="color:var(--danger)">🗑 清除全部</button>
    </div>
  </aside>

  <main class="main">
    <div class="main-header">
      <div>
        <div class="main-title" id="mainTitle">全部景點</div>
        <div class="main-sub" id="mainSub">AI 自動分類台灣景點</div>
      </div>
      <div class="search-bar" style="margin:0;width:220px;">
        <div class="search-input-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-input" placeholder="搜尋景點名稱…" id="searchInput" oninput="renderSpots()">
        </div>
      </div>
    </div>
    <div class="spots-grid" id="spotsGrid"></div>
  </main>
</div>

<!-- ADD MODAL -->
<div class="overlay" id="addOverlay" onclick="closeAddIfOutside(event)">
  <div class="modal">
    <div class="modal-title">✚ 新增景點</div>

    <div class="form-group">
      <label class="form-label">景點名稱 *</label>
      <input class="form-input" id="f-name" placeholder="例：清境農場、九份老街…" oninput="onNameInput()">
    </div>

    <div class="form-group">
      <label class="form-label">關鍵字 / 連結 / 描述</label>
      <textarea class="form-textarea" id="f-keywords" placeholder="貼上 Google Maps 連結、Instagram 連結、或任何描述文字…都可以！" oninput="onKeywordsInput()"></textarea>
      <div class="ai-hint" id="aiHint">🤖 AI 將根據以上資訊自動判斷縣市與區域</div>
    </div>

    <div class="form-group">
      <label class="form-label">類型標籤</label>
      <div style="display:flex;flex-wrap:wrap;gap:6px" id="typeTagsWrap">
        <label style="font-size:12px;cursor:pointer" id="tagLbl-景點"><input type="checkbox" name="type" value="景點" onchange="syncTypeTags()"> 🗺 景點</label>
        <label style="font-size:12px;cursor:pointer" id="tagLbl-美食"><input type="checkbox" name="type" value="美食" onchange="syncTypeTags()"> 🍜 美食</label>
        <label style="font-size:12px;cursor:pointer" id="tagLbl-住宿"><input type="checkbox" name="type" value="住宿" onchange="syncTypeTags()"> 🏠 住宿</label>
        <label style="font-size:12px;cursor:pointer" id="tagLbl-咖啡廳"><input type="checkbox" name="type" value="咖啡廳" onchange="syncTypeTags()"> ☕ 咖啡廳</label>
        <label style="font-size:12px;cursor:pointer" id="tagLbl-夜市"><input type="checkbox" name="type" value="夜市" onchange="syncTypeTags()"> 🌙 夜市</label>
        <label style="font-size:12px;cursor:pointer" id="tagLbl-自然"><input type="checkbox" name="type" value="自然" onchange="syncTypeTags()"> 🌿 自然</label>
        <label style="font-size:12px;cursor:pointer" id="tagLbl-海灘"><input type="checkbox" name="type" value="海灘" onchange="syncTypeTags()"> 🏖 海灘</label>
        <label style="font-size:12px;cursor:pointer" id="tagLbl-文化"><input type="checkbox" name="type" value="文化" onchange="syncTypeTags()"> 🏛 文化</label>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-group" style="margin:0">
        <label class="form-label">縣市 (AI 自動填入)</label>
        <input class="form-input" id="f-county" placeholder="例：南投縣">
      </div>
      <div class="form-group" style="margin:0">
        <label class="form-label">區域 (AI 自動填入)</label>
        <input class="form-input" id="f-district" placeholder="例：仁愛鄉">
      </div>
    </div>

    <div id="aiStatusWrap" style="margin-top:8px;min-height:24px"></div>

    <div class="form-group" style="margin-top:8px">
      <label class="form-label">個人備註</label>
      <input class="form-input" id="f-note" placeholder="想說什麼都可以…">
    </div>

    <div class="form-group">
      <label class="form-label">表情符號縮圖</label>
      <input class="form-input" id="f-emoji" placeholder="🏔 🌊 🍣 🏯 …" maxlength="4" style="font-size:1.4rem;width:80px">
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="closeAdd()">取消</button>
      <button class="btn" onclick="autoClassify()" id="btnAI">🤖 AI 分類</button>
      <button class="btn btn-primary" onclick="saveSpot()">儲存景點</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="detailOverlay" onclick="closeDetailIfOutside(event)">
  <div class="detail-modal" id="detailModal">
    <div class="detail-thumb" id="detailThumb">🏔</div>
    <div class="detail-body">
      <div class="detail-name" id="detailName"></div>
      <div class="detail-loc" id="detailLoc"></div>
      <div class="detail-tags" id="detailTags"></div>
      <div class="detail-note" id="detailNote"></div>
      <div class="detail-link" id="detailLink"></div>
      <div class="detail-footer">
        <div class="user-label">
          <div class="avatar" id="detailAvatar"></div>
          <span id="detailUser"></span>
          <span style="color:var(--text-muted);margin-left:4px;font-size:11px" id="detailDate"></span>
        </div>
        <button class="btn btn-sm" style="color:var(--danger);border-color:#fcc" onclick="deleteCurrentDetail()">🗑 刪除</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'tw_travel_spots_v2';
let spots = [];
let currentFilter = 'all';
let currentDetailId = null;
let aiTimeout = null;
let pendingCoverImage = null;
let expandedCounties = new Set();

const REGION_MAP = {
  '北部': ['台北市','臺北市','新北市','基隆市','桃園市','新竹市','新竹縣','宜蘭縣'],
  '中部': ['台中市','臺中市','苗栗縣','彰化縣','南投縣','雲林縣'],
  '南部': ['台南市','臺南市','高雄市','嘉義市','嘉義縣','屏東縣'],
  '東部': ['花蓮縣','台東縣','臺東縣'],
  '離島': ['澎湖縣','金門縣','連江縣','蘭嶼','綠島','小琉球'],
};

const COUNTY_EMOJI = {
  '台北市':'🏙','臺北市':'🏙','新北市':'🌆','基隆市':'⚓','桃園市':'✈','新竹市':'💻','新竹縣':'🎋',
  '宜蘭縣':'🌾','台中市':'🌸','臺中市':'🌸','苗栗縣':'🍓','彰化縣':'🌻','南投縣':'🏔','雲林縣':'🌽',
  '台南市':'🏯','臺南市':'🏯','高雄市':'🌊','嘉義市':'🌲','嘉義縣':'🌲','屏東縣':'🌴',
  '花蓮縣':'🦋','台東縣':'🌊','臺東縣':'🌊','澎湖縣':'🪸','金門縣':'🏝','連江縣':'🐟',
};

function load() {
  try { spots = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { spots = []; }
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(spots));
}

function getRegion(county) {
  for (const [r, cs] of Object.entries(REGION_MAP)) {
    if (cs.some(c => county && county.includes(c.replace(/市|縣/,'')))) return r;
  }
  return '其他';
}

function getUserName() { return document.getElementById('usernameInput').value || '旅人'; }
function getInitials(name) { return name ? name[0] : '?'; }

/* ---- RENDER ---- */
function renderSpots() {
  const grid = document.getElementById('spotsGrid');
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = spots.filter(s => {
    if (currentFilter === 'all') return true;
    if (currentFilter === '未分類') return !s.county || s.county === '未分類';
    if (currentFilter.includes('/')) {
      const [county, district] = currentFilter.split('/');
      return s.county === county && s.district === district;
    }
    return s.county === currentFilter || getRegion(s.county) === currentFilter;
  }).filter(s => {
    if (!q) return true;
    return (s.name||'').toLowerCase().includes(q) ||
           (s.county||'').includes(q) ||
           (s.district||'').includes(q) ||
           (s.tags||[]).join('').includes(q);
  });

  if (!list.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <div class="empty-icon">🗺</div>
      <h3>還沒有景點</h3>
      <p style="font-size:13px">點擊右上角「新增景點」開始收藏吧！</p>
    </div>`;
    return;
  }

  grid.innerHTML = list.map(s => {
    const region = getRegion(s.county);
    const emoji = s.emoji || COUNTY_EMOJI[s.county] || '📍';
    const tags = (s.tags||[]).map(t => `<span class="tag type">${t}</span>`).join('');
    const urlMatch = (s.keywords||'').match(/https?:\/\/\S+/);
    const linkHtml = urlMatch ? `<a href="${urlMatch[0]}" target="_blank" onclick="event.stopPropagation()" style="color:var(--accent);font-size:11px">🔗 查看連結</a>` : '';
    const thumbHtml = s.coverImage
      ? `<img src="${s.coverImage}" alt="" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.innerHTML='<div class=card-thumb-emoji>${emoji}</div>'">`
      : `<div class="card-thumb-emoji">${emoji}</div>`;
    return `<div class="spot-card" onclick="openDetail('${s.id}')">
      <div class="card-thumb">${thumbHtml}</div>
      <div class="card-body">
        <div class="card-name">${s.name}</div>
        <div class="card-loc">📍 ${s.county||'未分類'}${s.district?' · '+s.district:''}</div>
        <div class="card-tags">
          <span class="tag region">${region}</span>
          ${tags}
        </div>
        ${s.note ? `<div style="font-size:12px;color:var(--text-muted);margin-bottom:6px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${s.note}</div>` : ''}
        <div class="card-footer">
          <div class="card-user">
            <div class="avatar" style="background:${s.color||'var(--accent)'}">${getInitials(s.user)}</div>
            <span style="font-size:11px">${s.user||'旅人'}</span>
            ${linkHtml}
          </div>
          <button class="card-del" onclick="event.stopPropagation();deleteSpot('${s.id}')">✕</button>
        </div>
      </div>
    </div>`;
  }).join('');

  renderSidebar();
}

function renderSidebar() {
  document.getElementById('count-all').textContent = spots.length;
  const uncat = spots.filter(s => !s.county || s.county === '未分類').length;
  document.getElementById('count-未分類').textContent = uncat;

  // Build county → district counts
  const countyMap = {}; // { county: { total, districts: { district: count } } }
  spots.forEach(s => {
    const c = s.county || '未分類';
    const d = s.district || '未指定';
    if (!countyMap[c]) countyMap[c] = { total: 0, districts: {} };
    countyMap[c].total++;
    countyMap[c].districts[d] = (countyMap[c].districts[d] || 0) + 1;
  });

  const regionList = document.getElementById('regionList');
  let html = '';

  Object.entries(REGION_MAP).forEach(([region, cs]) => {
    const regionSpots = spots.filter(s => cs.some(c => (s.county||'').includes(c.replace(/市|縣/,''))));
    if (!regionSpots.length) return;

    const isRegionActive = currentFilter === region;
    html += `<button class="sidebar-item${isRegionActive ? ' active' : ''}" onclick="filterRegion('${region}',this)">
      ${region}
      <span class="count">${regionSpots.length}</span>
    </button>`;

    // Counties inside this region
    Object.entries(countyMap)
      .filter(([c]) => cs.some(cc => c.includes(cc.replace(/市|縣/,''))))
      .forEach(([county, data]) => {
        const isCountyActive = currentFilter === county;
        const isExpanded = expandedCounties.has(county) || currentFilter === county || cs.some(cc => currentFilter.startsWith(county + '/'));
        const hasDistricts = Object.keys(data.districts).filter(d => d !== '未指定').length > 0;

        html += `<button class="sidebar-item${isCountyActive ? ' active' : ''}${isExpanded && hasDistricts ? ' expanded' : ''}"
          onclick="toggleCounty('${county}', this)"
          style="padding-left:1.6rem;font-size:13px">
          ${COUNTY_EMOJI[county]||'📍'} ${county}
          ${hasDistricts ? `<span class="arrow">▶</span>` : ''}
          <span class="count" style="margin-left:${hasDistricts?'0':'auto'}">${data.total}</span>
        </button>`;

        if (hasDistricts) {
          html += `<div class="county-children${isExpanded ? ' open' : ''}" id="children-${county.replace(/\s/g,'')}">`;
          // "全部縣市" option
          html += `<button class="sidebar-item${isCountyActive ? ' active' : ''}"
            onclick="filterRegion('${county}', this)"
            style="padding-left:2.8rem;font-size:12px;color:var(--text-muted)">
            全部 ${county}
            <span class="count">${data.total}</span>
          </button>`;
          // Each district
          Object.entries(data.districts)
            .sort((a,b) => b[1]-a[1])
            .forEach(([district, count]) => {
              if (district === '未指定') return;
              const distKey = county + '/' + district;
              const isDistActive = currentFilter === distKey;
              html += `<button class="sidebar-item${isDistActive ? ' active' : ''}"
                onclick="filterRegion('${distKey}', this)"
                style="padding-left:2.8rem;font-size:12px">
                ${district}
                <span class="count">${count}</span>
              </button>`;
            });
          html += `</div>`;
        }
      });
  });

  // Uncategorized county
  if (countyMap['未分類']) {
    html += `<button class="sidebar-item${currentFilter==='未分類'?' active':''}" onclick="filterRegion('未分類',this)" style="padding-left:1.6rem;font-size:13px">
      📍 未分類 <span class="count">${countyMap['未分類'].total}</span>
    </button>`;
  }

  regionList.innerHTML = html;
}

function toggleCounty(county, el) {
  const hasDistricts = el.nextElementSibling && el.nextElementSibling.classList.contains('county-children');
  if (!hasDistricts) {
    filterRegion(county, el);
    return;
  }
  if (expandedCounties.has(county)) {
    expandedCounties.delete(county);
  } else {
    expandedCounties.add(county);
  }
  renderSidebar();
  // Also filter to county level if not already filtering within it
  if (!currentFilter.startsWith(county)) {
    currentFilter = county;
    document.getElementById('mainTitle').textContent = county;
    renderSpots();
  }
}

function filterRegion(r, el) {
  currentFilter = r;
  // If it's a district key like "新北市/瑞芳區", auto-expand parent county
  if (r.includes('/')) {
    expandedCounties.add(r.split('/')[0]);
  }
  renderSidebar();
  // Set title
  if (r.includes('/')) {
    const [county, district] = r.split('/');
    document.getElementById('mainTitle').textContent = `${county} · ${district}`;
  } else {
    const titleMap = {'all':'全部景點','未分類':'待分類景點','北部':'北部景點','中部':'中部景點','南部':'南部景點','東部':'東部景點','離島':'離島景點'};
    document.getElementById('mainTitle').textContent = titleMap[r] || r;
  }
  renderSpots();
}

/* ---- AI CLASSIFY ---- */
async function autoClassify() {
  const name = document.getElementById('f-name').value.trim();
  const keywords = document.getElementById('f-keywords').value.trim();
  if (!name && !keywords) { showToast('請輸入景點名稱或關鍵字'); return; }

  const wrap = document.getElementById('aiStatusWrap');
  document.getElementById('btnAI').disabled = true;

  // Detect URL in keywords
  const urlMatch = keywords.match(/https?:\/\/\S+/);
  const hasUrl = !!urlMatch;

  wrap.innerHTML = `<div class="ai-status"><span class="dot"></span><span class="dot"></span><span class="dot"></span> ${hasUrl ? '讀取網址內容中…' : 'AI 分析中…'}</div>`;

  const systemPrompt = `你是台灣旅遊景點分類專家。使用者會提供景點名稱、描述或網址。
若有提供網址，請使用 web_search 工具搜尋該網址，讀取頁面內容，以取得景點的實際位置資訊與封面圖片。
分析完後，請只回傳以下 JSON 格式，不要任何多餘文字或 markdown：
{
  "county": "縣市名稱（例：新北市、台南市）",
  "district": "鄉鎮區名稱（例：瑞芳區、中西區）",
  "spot_name": "景點的正確名稱（若使用者沒填或填錯，請補上）",
  "types": ["類型1"],
  "emoji": "最適合的單一表情符號",
  "summary": "一句話描述這個景點",
  "image_url": "頁面的封面圖片完整URL（og:image 或文章第一張圖，找不到則填 null）",
  "confidence": "high/medium/low"
}
類型只能從：景點、美食、住宿、咖啡廳、夜市、自然、海灘、文化
無法判斷時 county 填 "未分類"。
image_url 必須是完整的 https:// 開頭的圖片網址，若找不到填 null。`;

  const userMsg = `景點名稱：${name || '（未填）'}
補充資訊 / 網址：${keywords || '（無）'}`;

  // Build tools array - use web_search when URL present
  const tools = hasUrl ? [{
    type: 'web_search_20250305',
    name: 'web_search'
  }] : undefined;

  try {
    const body = {
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: 'user', content: userMsg }],
    };
    if (tools) body.tools = tools;

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await resp.json();

    // Handle multi-turn if tool_use happened (agentic loop, max 3 turns)
    let finalText = '';
    let messages = [{ role: 'user', content: userMsg }];
    let currentData = data;

    for (let i = 0; i < 4; i++) {
      const content = currentData.content || [];
      const textBlocks = content.filter(b => b.type === 'text').map(b => b.text).join('');
      const toolUseBlocks = content.filter(b => b.type === 'tool_use');

      if (toolUseBlocks.length === 0) {
        finalText = textBlocks;
        break;
      }

      // Update status
      wrap.innerHTML = `<div class="ai-status"><span class="dot"></span><span class="dot"></span><span class="dot"></span> AI 搜尋網路資料中…</div>`;

      // Add assistant turn
      messages.push({ role: 'assistant', content });

      // Build tool results (we let the model handle search results itself)
      const toolResults = toolUseBlocks.map(tb => ({
        type: 'tool_result',
        tool_use_id: tb.id,
        content: '請繼續根據搜尋結果進行分類。'
      }));
      messages.push({ role: 'user', content: toolResults });

      const resp2 = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: systemPrompt,
          tools: tools,
          messages
        })
      });
      currentData = await resp2.json();
    }

    const jsonMatch = finalText.match(/\{[\s\S]*?\}/);
    if (!jsonMatch) throw new Error('no json');
    const result = JSON.parse(jsonMatch[0]);

    document.getElementById('f-county').value = result.county || '';
    document.getElementById('f-district').value = result.district || '';
    if (result.emoji) document.getElementById('f-emoji').value = result.emoji;
    // Auto-fill name if user left it blank
    if (!name && result.spot_name) document.getElementById('f-name').value = result.spot_name;
    // Auto-fill note with summary
    if (result.summary && !document.getElementById('f-note').value) {
      document.getElementById('f-note').value = result.summary;
    }
    if (result.types) {
      document.querySelectorAll('[name="type"]').forEach(c => {
        c.checked = result.types.includes(c.value);
      });
    }
    const confLabel = {'high':'高信心','medium':'中等信心','low':'低信心'}[result.confidence] || '';
    const webLabel = hasUrl ? ' · 已讀取網址' : '';

    // Use image_url returned by AI
    const ogImg = (result.image_url && result.image_url !== 'null') ? result.image_url : null;
    if (ogImg) {
      pendingCoverImage = ogImg;
      wrap.innerHTML = `<div class="ai-status" style="color:var(--accent)">✓ 分類完成（${confLabel}${webLabel}）· 已抓取封面圖 🖼</div>`;
    } else {
      pendingCoverImage = null;
      wrap.innerHTML = `<div class="ai-status" style="color:var(--accent)">✓ 分類完成（${confLabel}${webLabel}）—— 可手動調整</div>`;
    }
  } catch(e) {
    console.error(e);
    wrap.innerHTML = `<div class="ai-status" style="color:var(--text-muted)">⚠ AI 無法判斷，請手動填寫縣市</div>`;
  }
  document.getElementById('btnAI').disabled = false;
}

function saveSpot() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('請輸入景點名稱'); return; }
  const colors = ['#3d6b4f','#c4763a','#4a7fa5','#7d5a9e','#c0392b','#1a7a7a'];
  const spot = {
    id: Date.now().toString(),
    name,
    keywords: document.getElementById('f-keywords').value.trim(),
    county: document.getElementById('f-county').value.trim() || '未分類',
    district: document.getElementById('f-district').value.trim(),
    tags: getSelectedTypes(),
    note: document.getElementById('f-note').value.trim(),
    emoji: document.getElementById('f-emoji').value.trim(),
    coverImage: pendingCoverImage || null,
    user: getUserName(),
    color: colors[Math.floor(Math.random()*colors.length)],
    date: new Date().toLocaleDateString('zh-TW'),
  };
  spots.unshift(spot);
  save();
  closeAdd();
  renderSpots();
  showToast(`✓ 已新增「${name}」`);
}

/* ---- DETAIL ---- */
function openDetail(id) {
  const s = spots.find(x=>x.id===id);
  if (!s) return;
  currentDetailId = id;
  const emoji = s.emoji || COUNTY_EMOJI[s.county] || '📍';
  if (s.coverImage) {
    document.getElementById('detailThumb').innerHTML =
      `<img src="${s.coverImage}" alt="" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.innerHTML='<span style=font-size:4rem>${emoji}</span>'">`;
  } else {
    document.getElementById('detailThumb').innerHTML = `<span style="font-size:4rem">${emoji}</span>`;
  }
  document.getElementById('detailName').textContent = s.name;
  document.getElementById('detailLoc').innerHTML = `📍 ${s.county||'未分類'}${s.district?' · '+s.district:''}`;
  document.getElementById('detailTags').innerHTML =
    `<span class="tag region">${getRegion(s.county)}</span>` +
    (s.tags||[]).map(t=>`<span class="tag type">${t}</span>`).join('');
  document.getElementById('detailNote').textContent = s.note || '';
  const urlMatch = (s.keywords||'').match(/https?:\/\/\S+/);
  document.getElementById('detailLink').innerHTML = urlMatch ?
    `<a href="${urlMatch[0]}" target="_blank">🔗 ${urlMatch[0]}</a>` : '';
  document.getElementById('detailAvatar').textContent = getInitials(s.user);
  document.getElementById('detailAvatar').style.background = s.color || 'var(--accent)';
  document.getElementById('detailUser').textContent = s.user || '旅人';
  document.getElementById('detailDate').textContent = s.date || '';
  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetailIfOutside(e) {
  if(e.target===document.getElementById('detailOverlay')) {
    document.getElementById('detailOverlay').classList.remove('open');
  }
}
function deleteCurrentDetail() {
  if (!currentDetailId) return;
  deleteSpot(currentDetailId);
  document.getElementById('detailOverlay').classList.remove('open');
}
function deleteSpot(id) {
  spots = spots.filter(s=>s.id!==id);
  save(); renderSpots();
  showToast('景點已刪除');
}

/* ---- UTILS ---- */
function showToast(msg, dur=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}

function exportData() {
  const blob = new Blob([JSON.stringify(spots,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `旅遊景點_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')}.json`;
  a.click();
  showToast('✓ 已匯出');
}
function importData() { document.getElementById('importFile').click(); }
function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) throw new Error();
      const existing = new Set(spots.map(s=>s.id));
      const newOnes = data.filter(s=>!existing.has(s.id));
      spots = [...newOnes, ...spots];
      save(); renderSpots();
      showToast(`✓ 匯入 ${newOnes.length} 筆景點`);
    } catch { showToast('❌ 檔案格式錯誤'); }
  };
  r.readAsText(file);
  e.target.value='';
}
function clearAll() {
  if (!confirm('確定要刪除全部景點嗎？')) return;
  spots = []; save(); renderSpots();
  showToast('已清除全部');
}
